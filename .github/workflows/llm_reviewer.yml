name: LLM Code Assistant

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize]

jobs:
  llm_review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install requests PyGithub google-generativeai

      - name: Rodar Script da LLM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Nativo do GitHub
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Sua chave
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: python .github/scripts/llm_agent.py