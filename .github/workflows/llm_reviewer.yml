name: Chat com a IA

on:
  issue_comment:
    types: [created]

jobs:
  chat:
    runs-on: ubuntu-latest
    permissions:
      issues: write # Permissão necessária para comentar na issue
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install @google/generative-ai @actions/github
      - run: node .github/scripts/llm_agent.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}