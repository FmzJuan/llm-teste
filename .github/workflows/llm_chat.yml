name: DevBot - Agente Central

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize] # Ativa na criação e atualização de PRs
  workflow_dispatch:
  workflow_call: # Permite que outros repositórios chamem este workflow
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  ai_agent:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write # Necessário para postar reviews
      contents: read
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: |
           npm init -y
           npm install @google/generative-ai @octokit/rest

      - name: Rodar Agente
        run: node .github/scripts/llm_agent.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}